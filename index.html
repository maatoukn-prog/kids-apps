<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kids Apps">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FBF6EF">
<link rel="manifest" href="hub-manifest.webmanifest">
<link rel="apple-touch-icon" href="hub-icon-180.png">
<title>Kids Apps</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; background: #FBF6EF;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overscroll-behavior: none;
  }
  body {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    padding: calc(28px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
    min-height: 100vh;
  }
  h1 { font-size: clamp(28px, 5vw, 44px); font-weight: 800; color: #3A2E28; margin-bottom: 6px; letter-spacing: -0.01em; text-align: center; }
  p { font-size: 16px; color: #8a7d72; margin-bottom: clamp(20px, 4vh, 40px); text-align: center; }
  .grid { width: 100%; max-width: 780px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: clamp(12px, 2.6vw, 24px); }
  a { text-decoration: none; border-radius: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 8px 20px -8px rgba(0,0,0,0.28); padding: 16px; aspect-ratio: 1; transition: transform 0.12s, box-shadow 0.12s; -webkit-user-select: none; user-select: none; }
  a:active { transform: scale(0.95); box-shadow: 0 4px 10px -4px rgba(0,0,0,0.2); }
  .glyph { width: clamp(52px, 11vw, 80px); height: clamp(52px, 11vw, 80px); border-radius: 20px; background: rgba(255,255,255,0.28); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: clamp(24px, 5.5vw, 38px); color: #fff; }
  .label { font-weight: 700; font-size: clamp(13px, 2vw, 18px); color: #fff; text-align: center; line-height: 1.2; }
</style>
</head>
<body>
  <h1>Kids Apps</h1>
  <p>Pick something to play</p>
  <div class="grid">
    <a href="apps/flashcards.html" style="background:#EF7A5D;">
      <div class="glyph">Fr</div>
      <div class="label">French Words</div>
    </a>
    <a href="apps/flags.html" style="background:#5B9BD5;">
      <div class="glyph">&#x2691;</div>
      <div class="label">World Flags</div>
    </a>
    <a href="apps/lila-math.html" style="background:#6FBF73;">
      <div class="glyph">+</div>
      <div class="label">Lila's Math</div>
    </a>
    <a href="apps/aria-math.html" style="background:#E6B94D;">
      <div class="glyph">#</div>
      <div class="label">Aria's Math</div>
    </a>
    <a href="Kids Trivia.dc.html" style="background:#8E6FBF;">
      <div class="glyph">?</div>
      <div class="label">Kids Trivia</div>
    </a>
  </div>
</body>
</html>
